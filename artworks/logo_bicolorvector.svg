<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 176">
  <defs>
    <linearGradient id="sampledGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#38bdf8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0284c7;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- GRAPH ICON -->
  <g transform="translate(12, 8)">

    <!-- EDGES -->
    <line x1="62" y1="24" x2="108" y2="52" stroke="#64748b" stroke-width="1.2" stroke-linecap="round" opacity="0.4"/>
    <line x1="62" y1="24" x2="36" y2="72" stroke="#64748b" stroke-width="1.2" stroke-linecap="round" opacity="0.4"/>
    <line x1="108" y1="52" x2="132" y2="100" stroke="#64748b" stroke-width="1.2" stroke-linecap="round" opacity="0.4"/>
    <line x1="108" y1="52" x2="76" y2="100" stroke="#64748b" stroke-width="1.2" stroke-linecap="round" opacity="0.4"/>
    <line x1="36" y1="72" x2="76" y2="100" stroke="#64748b" stroke-width="1.2" stroke-linecap="round" opacity="0.4"/>
    <line x1="36" y1="72" x2="16" y2="124" stroke="#64748b" stroke-width="1.2" stroke-linecap="round" opacity="0.4"/>
    <line x1="76" y1="100" x2="56" y2="140" stroke="#64748b" stroke-width="1.2" stroke-linecap="round" opacity="0.4"/>
    <line x1="132" y1="100" x2="148" y2="140" stroke="#64748b" stroke-width="1.2" stroke-linecap="round" opacity="0.4"/>
    <line x1="132" y1="100" x2="106" y2="140" stroke="#64748b" stroke-width="1.2" stroke-linecap="round" opacity="0.4"/>
    <line x1="56" y1="140" x2="106" y2="140" stroke="#64748b" stroke-width="1.2" stroke-linecap="round" opacity="0.4"/>
    <line x1="16" y1="124" x2="56" y2="140" stroke="#64748b" stroke-width="1.2" stroke-linecap="round" opacity="0.4"/>
    <line x1="106" y1="140" x2="148" y2="140" stroke="#64748b" stroke-width="1.2" stroke-linecap="round" opacity="0.4"/>

    <!-- Edges touching sampled nodes -->
    <line x1="62" y1="24" x2="108" y2="52" stroke="#38bdf8" stroke-width="1.5" stroke-linecap="round" opacity="0.35"/>
    <line x1="62" y1="24" x2="36" y2="72" stroke="#38bdf8" stroke-width="1.5" stroke-linecap="round" opacity="0.35"/>
    <line x1="36" y1="72" x2="16" y2="124" stroke="#38bdf8" stroke-width="1.5" stroke-linecap="round" opacity="0.35"/>
    <line x1="16" y1="124" x2="56" y2="140" stroke="#38bdf8" stroke-width="1.5" stroke-linecap="round" opacity="0.35"/>
    <line x1="132" y1="100" x2="148" y2="140" stroke="#38bdf8" stroke-width="1.5" stroke-linecap="round" opacity="0.35"/>
    <line x1="106" y1="140" x2="148" y2="140" stroke="#38bdf8" stroke-width="1.5" stroke-linecap="round" opacity="0.35"/>

    <!-- UNSAMPLED NODES -->
    <circle cx="108" cy="52" r="5" fill="#94a3b8" opacity="0.7"/>
    <circle cx="36" cy="72" r="5" fill="#94a3b8" opacity="0.7"/>
    <circle cx="76" cy="100" r="5" fill="#94a3b8" opacity="0.7"/>
    <circle cx="132" cy="100" r="4.5" fill="#94a3b8" opacity="0.7"/>
    <circle cx="56" cy="140" r="4.5" fill="#94a3b8" opacity="0.7"/>
    <circle cx="106" cy="140" r="4.5" fill="#94a3b8" opacity="0.7"/>

    <!-- SAMPLED NODES -->
    <circle cx="62" cy="24" r="9.5" fill="url(#sampledGrad)" filter="url(#glow)"/>
    <circle cx="16" cy="124" r="9.5" fill="url(#sampledGrad)" filter="url(#glow)"/>
    <circle cx="148" cy="140" r="9.5" fill="url(#sampledGrad)" filter="url(#glow)"/>

    <!-- Specular highlights -->
    <circle cx="59.5" cy="21.5" r="2.4" fill="white" opacity="0.35"/>
    <circle cx="13.5" cy="121.5" r="2.4" fill="white" opacity="0.35"/>
    <circle cx="145.5" cy="137.5" r="2.4" fill="white" opacity="0.35"/>
  </g>

  <!-- TYPOGRAPHY -->
  <!-- "Network" light weight, neutral gray that reads on both light and dark -->
  <text x="190" y="92" 
        font-family="'Fira Sans', 'Helvetica Neue', 'Segoe UI', sans-serif" 
        font-size="54" 
        font-weight="300"
        letter-spacing="-0.5"
        fill="#94a3b8">Network</text>

  <!-- "Sampler" bold, blue gradient -->
  <text x="190" y="150" 
        font-family="'Fira Sans', 'Helvetica Neue', 'Segoe UI', sans-serif" 
        font-size="54" 
        font-weight="700"
        letter-spacing="-0.5"
        fill="url(#sampledGrad)">Sampler</text>

</svg>
